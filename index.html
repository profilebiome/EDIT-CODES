<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Multi-LLM Gratuito</title>
    <!-- Puter.js SDK - Acceso gratuito a 400+ modelos -->
    <script src="https://js.puter.com/v2/"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1a1a2e;
            --text-secondary: #666;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --bubble-user: #6366f1;
            --bubble-user-text: #fff;
            --bubble-bot: #e8e8ed;
            --bubble-bot-text: #1a1a2e;
            --border: #e0e0e0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --input-bg: #f5f5f5;
        }

        .dark {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --text: #e0e0e0;
            --text-secondary: #999;
            --accent: #818cf8;
            --accent-hover: #6366f1;
            --bubble-user: #818cf8;
            --bubble-user-text: #fff;
            --bubble-bot: #252540;
            --bubble-bot-text: #e0e0e0;
            --border: #2a2a40;
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --input-bg: #252540;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .chat-container {
            width: 100%;
            max-width: 850px;
            height: 95vh;
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin: 10px;
        }

        /* ===== HEADER ===== */
        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: var(--surface);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .model-select {
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            outline: none;
        }

        .model-select:focus {
            border-color: var(--accent);
        }

        .btn-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--text);
            font-size: 1rem;
        }

        .btn-icon:hover {
            background: var(--bubble-bot);
        }

        .btn-new-chat {
            padding: 8px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-new-chat:hover {
            background: var(--bubble-bot);
        }

        /* ===== MESSAGES AREA ===== */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .welcome-message {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
        }

        .welcome-message h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: var(--text);
        }

        .welcome-message p {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message.bot {
            align-self: flex-start;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
            font-weight: 700;
        }

        .message.user .avatar {
            background: var(--bubble-user);
            color: white;
        }

        .message.bot .avatar {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
        }

        .bubble {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            font-size: 0.92rem;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            color: var(--bubble-user-text);
            border-bottom-right-radius: 4px;
        }

        .message.bot .bubble {
            background: var(--bubble-bot);
            color: var(--bubble-bot-text);
            border-bottom-left-radius: 4px;
        }

        .bubble pre {
            background: rgba(0,0,0,0.1);
            border-radius: 8px;
            padding: 12px;
            overflow-x: auto;
            margin: 8px 0;
            font-size: 0.85rem;
        }

        .bubble code {
            background: rgba(0,0,0,0.08);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-secondary);
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1); }
        }

        .error-bubble {
            background: #fee2e2 !important;
            color: #dc2626 !important;
            border: 1px solid #fca5a5;
        }

        .dark .error-bubble {
            background: #3b1111 !important;
            color: #fca5a5 !important;
            border-color: #7f1d1d;
        }

        /* ===== INPUT AREA ===== */
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--surface);
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .chat-input {
            width: 100%;
            padding: 12px 16px;
            padding-right: 50px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
            font-size: 0.92rem;
            resize: none;
            outline: none;
            font-family: inherit;
            transition: all 0.2s;
            max-height: 120px;
            line-height: 1.5;
        }

        .chat-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }

        .char-count {
            position: absolute;
            right: 12px;
            bottom: 8px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-stop {
            background: #ef4444;
            display: none;
        }

        .btn-stop:hover {
            background: #dc2626;
        }

        .btn-stop.visible {
            display: flex;
        }

        .btn-send.hidden {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .chat-container {
                height: 100vh;
                margin: 0;
                border-radius: 0;
            }
            .message {
                max-width: 90%;
            }
            .chat-header {
                padding: 10px 14px;
            }
            .header-title {
                font-size: 1rem;
            }
            .model-select {
                font-size: 0.78rem;
                padding: 6px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- HEADER -->
        <div class="chat-header">
            <div class="header-left">
                <div class="header-logo">🤖</div>
                <span class="header-title">Chat Multi-LLM</span>
            </div>
            <div class="header-actions">
                <select class="model-select" id="modelSelect" title="Seleccionar modelo de IA">
                    <option value="gpt-5-nano">⚡ GPT-5 Nano (OpenAI)</option>
                    <option value="claude-sonnet-4-5">🎯 Claude Sonnet 4.5</option>
                    <option value="google/gemini-2.5-flash">🔍 Gemini 2.5 Flash</option>
                    <option value="deepseek/deepseek-r1">🧠 DeepSeek R1</option>
                    <option value="meta-llama/llama-4-maverick">🦙 Llama 4 Maverick</option>
                    <option value="gpt-4o">💎 GPT-4o</option>
                    <option value="o3-mini">⚙️ o3-mini (razonamiento)</option>
                    <option value="cohere/command-a-03-2025">🔷 Command A</option>
                </select>
                <button class="btn-icon" id="themeToggle" title="Cambiar tema">🌓</button>
                <button class="btn-new-chat" id="newChatBtn">✨ Nuevo Chat</button>
            </div>
        </div>

        <!-- MESSAGES -->
        <div class="messages-area" id="messagesArea">
            <div class="welcome-message">
                <h2>👋 ¡Bienvenido al Chat Multi-LLM!</h2>
                <p>Selecciona un modelo y empieza a conversar.<br>
                ⚡ Gratis • Sin API keys • 100% navegador</p>
            </div>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea
                    class="chat-input"
                    id="chatInput"
                    placeholder="Escribe tu mensaje..."
                    rows="1"
                    maxlength="4000"
                ></textarea>
                <span class="char-count" id="charCount">0 / 4000</span>
            </div>
            <button class="btn-send" id="sendBtn" title="Enviar">➤</button>
            <button class="btn-send btn-stop" id="stopBtn" title="Detener respuesta">■</button>
        </div>
    </div>

    <script>
        (function() {
            // ========== DOM ELEMENTS ==========
            const messagesArea = document.getElementById('messagesArea');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendBtn');
            const stopBtn = document.getElementById('stopBtn');
            const modelSelect = document.getElementById('modelSelect');
            const themeToggle = document.getElementById('themeToggle');
            const newChatBtn = document.getElementById('newChatBtn');
            const charCount = document.getElementById('charCount');

            // ========== STATE ==========
            let conversationHistory = [];
            let currentStream = null; // Para poder cancelar streaming
            let isProcessing = false;

            // ========== THEME ==========
            // Cargar tema guardado
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark');
                themeToggle.textContent = '☀️';
            }

            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const isDark = document.body.classList.contains('dark');
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.textContent = isDark ? '☀️' : '🌓';
            });

            // ========== AUTO-RESIZE TEXTAREA ==========
            chatInput.addEventListener('input', () => {
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
                charCount.textContent = `${chatInput.value.length} / 4000`;
            });

            // ========== SEND MESSAGE ==========
            sendBtn.addEventListener('click', sendMessage);
            chatInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // ========== STOP ==========
            stopBtn.addEventListener('click', stopStreaming);

            // ========== NEW CHAT ==========
            newChatBtn.addEventListener('click', () => {
                conversationHistory = [];
                messagesArea.innerHTML = `
                    <div class="welcome-message">
                        <h2>👋 ¡Bienvenido al Chat Multi-LLM!</h2>
                        <p>Selecciona un modelo y empieza a conversar.<br>
                        ⚡ Gratis • Sin API keys • 100% navegador</p>
                    </div>`;
                chatInput.value = '';
                chatInput.style.height = 'auto';
                charCount.textContent = '0 / 4000';
            });

            // ========== SEND MESSAGE FUNCTION ==========
            async function sendMessage() {
                if (isProcessing) return;

                const message = chatInput.value.trim();
                if (!message) return;

                // UI de envío
                isProcessing = true;
                sendBtn.classList.add('hidden');
                stopBtn.classList.add('visible');
                chatInput.value = '';
                chatInput.style.height = 'auto';
                charCount.textContent = '0 / 4000';

                // Limpiar mensaje de bienvenida
                const welcome = messagesArea.querySelector('.welcome-message');
                if (welcome) welcome.remove();

                // Mostrar mensaje del usuario
                addMessage('user', message);
                conversationHistory.push({ role: 'user', content: message });

                // Crear contenedor para respuesta del bot
                const botMsgId = 'bot-' + Date.now();
                const botHtml = `
                    <div class="message bot" id="${botMsgId}">
                        <div class="avatar">AI</div>
                        <div class="bubble">
                            <div class="typing-indicator">
                                <span></span><span></span><span></span>
                            </div>
                        </div>
                    </div>`;
                messagesArea.insertAdjacentHTML('beforeend', botHtml);
                scrollToBottom();

                const selectedModel = modelSelect.value;
                const botBubble = document.querySelector(`#${botMsgId} .bubble`);

                try {
                    let fullResponse = '';

                    // Llamada a Puter.js con streaming
                    const response = await puter.ai.chat(
                        conversationHistory,
                        {
                            model: selectedModel,
                            stream: true,
                            temperature: 0.7,
                            max_tokens: 2000
                        }
                    );

                    currentStream = response;

                    // Procesar streaming
                    for await (const part of response) {
                        if (part?.text) {
                            fullResponse += part.text;
                            botBubble.innerHTML = formatMarkdown(fullResponse);
                            scrollToBottom();
                        }
                    }

                    // Si la respuesta está vacía
                    if (!fullResponse) {
                        botBubble.innerHTML = '⚠️ El modelo no devolvió respuesta. Prueba con otro modelo.';
                    } else {
                        botBubble.innerHTML = formatMarkdown(fullResponse);
                    }

                    conversationHistory.push({ role: 'assistant', content: fullResponse });

                } catch (error) {
                    console.error('Error:', error);
                    let errorMsg = '❌ Error al comunicarse con el modelo.';

                    if (error.message?.includes('usage-limited')) {
                        errorMsg = '🚫 Límite de uso alcanzado para este modelo. Prueba con otro modelo o más tarde.';
                    } else if (error.message?.includes('network')) {
                        errorMsg = '🌐 Error de conexión. Verifica tu internet.';
                    }

                    botBubble.innerHTML = errorMsg;
                    botBubble.classList.add('error-bubble');
                } finally {
                    currentStream = null;
                    isProcessing = false;
                    sendBtn.classList.remove('hidden');
                    stopBtn.classList.remove('visible');
                    scrollToBottom();
                }
            }

            // ========== STOP STREAMING ==========
            function stopStreaming() {
                if (currentStream && typeof currentStream.return === 'function') {
                    currentStream.return();
                }
                currentStream = null;
                isProcessing = false;
                sendBtn.classList.remove('hidden');
                stopBtn.classList.remove('visible');
            }

            // ========== ADD MESSAGE TO UI ==========
            function addMessage(role, content) {
                const avatarText = role === 'user' ? 'TÚ' : 'AI';
                const formatted = role === 'user' ? escapeHtml(content) : formatMarkdown(content);
                const html = `
                    <div class="message ${role}">
                        <div class="avatar">${avatarText}</div>
                        <div class="bubble">${formatted}</div>
                    </div>`;
                messagesArea.insertAdjacentHTML('beforeend', html);
                scrollToBottom();
            }

            // ========== SCROLL TO BOTTOM ==========
            function scrollToBottom() {
                requestAnimationFrame(() => {
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                });
            }

            // ========== SIMPLE MARKDOWN FORMATTING ==========
            function formatMarkdown(text) {
                if (!text) return '';
                let html = escapeHtml(text);
                // Código en línea
                html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
                // Negrita
                html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
                // Itálica
                html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
                // Saltos de línea
                html = html.replace(/\n/g, '<br>');
                return html;
            }

            // ========== ESCAPE HTML ==========
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ========== FOCUS INPUT ON LOAD ==========
            chatInput.focus();

            console.log('🚀 Chat Multi-LLM listo. Modelos disponibles: GPT-5, Claude, Gemini, DeepSeek, Llama...');
            console.log('ℹ️ Powered by Puter.js - Sin API keys, 100% cliente.');
        })();
    </script>
</body>
</html>
